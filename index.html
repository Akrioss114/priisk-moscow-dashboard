<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoSCoW-доска приоритизации требований</title>
  <style>
    :root {
      --bg: #f5f7f7;
      --surface: #ffffff;
      --surface-2: #eef3f1;
      --ink: #17201d;
      --muted: #60716b;
      --line: #d9e1de;
      --must: #b43f3f;
      --should: #b57710;
      --could: #24756f;
      --wont: #5b6470;
      --focus: #245fd6;
      --shadow: 0 12px 30px rgba(23, 32, 29, 0.13);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    body {
      overflow-x: hidden;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      border-radius: 7px;
      min-height: 34px;
      padding: 7px 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: #9fb0aa;
      background: #f9fbfa;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 18px 22px 14px;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.16;
      font-weight: 750;
    }

    .subtle {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .primary {
      background: #183d3a;
      border-color: #183d3a;
      color: #fff;
    }

    .primary:hover {
      background: #22534f;
      border-color: #22534f;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .metric {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 12px;
      min-height: 74px;
    }

    .metric .value {
      font-size: 24px;
      font-weight: 760;
      line-height: 1.1;
    }

    .metric .label {
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.25;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) minmax(150px, 0.8fr) minmax(150px, 0.8fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfc;
    }

    .field {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      padding: 7px 10px;
    }

    .board-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 16px 22px 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(280px, 1fr));
      gap: 12px;
      min-width: 1120px;
      align-items: start;
    }

    .lane {
      background: #fdfefe;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: calc(100vh - 250px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .lane[data-lane="must"] { --lane-color: var(--must); }
    .lane[data-lane="should"] { --lane-color: var(--should); }
    .lane[data-lane="could"] { --lane-color: var(--could); }
    .lane[data-lane="wont"] { --lane-color: var(--wont); }

    .lane-head {
      border-top: 5px solid var(--lane-color);
      padding: 11px 12px 10px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .lane-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .lane-letter {
      display: inline-flex;
      width: 26px;
      height: 26px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: var(--lane-color);
      color: #fff;
      font-weight: 800;
      margin-right: 7px;
    }

    .lane-name {
      font-weight: 760;
      font-size: 15px;
    }

    .lane-count {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .lane-subtitle {
      color: var(--muted);
      line-height: 1.3;
      margin-top: 7px;
      min-height: 36px;
    }

    .dropzone {
      padding: 10px;
      display: grid;
      gap: 9px;
      align-content: start;
      min-height: 220px;
      flex: 1;
    }

    .dropzone.over {
      background: #f0f6f4;
    }

    .card {
      border: 1px solid #dbe3e0;
      border-radius: 7px;
      background: var(--surface);
      box-shadow: 0 2px 8px rgba(23, 32, 29, 0.05);
      padding: 10px;
      cursor: grab;
      min-height: 142px;
      display: grid;
      gap: 8px;
    }

    .card:active {
      cursor: grabbing;
    }

    .card.drag-source {
      opacity: 0.45;
    }

    .drag-ghost {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      opacity: 0.96;
      transform: translate(-50%, -24px);
      box-shadow: var(--shadow);
    }

    body.dragging * {
      cursor: grabbing !important;
    }

    .card.hidden {
      display: none;
    }

    .card-title {
      font-weight: 720;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .summary {
      color: #2c3834;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid #d7dfdc;
      border-radius: 999px;
      padding: 2px 7px;
      min-height: 22px;
      color: #33423d;
      background: #f7faf9;
      font-size: 12px;
      line-height: 1.2;
      max-width: 100%;
    }

    .badge.backlog {
      border-color: #bad4ce;
      background: #edf8f5;
      color: #13584f;
      font-weight: 650;
    }

    .empty {
      border: 1px dashed #c9d5d1;
      border-radius: 7px;
      color: var(--muted);
      padding: 14px;
      text-align: center;
      display: none;
    }

    .side {
      display: grid;
      grid-template-columns: minmax(250px, 0.72fr) minmax(0, 1fr);
      gap: 14px;
      padding: 0 22px 20px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.3;
    }

    .sources {
      display: grid;
      gap: 8px;
      color: #33423d;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .sources div,
    .kv,
    .bar-row,
    .panel {
      overflow-wrap: anywhere;
    }

    .bar-list {
      display: grid;
      gap: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(110px, 180px) 1fr 34px;
      gap: 8px;
      align-items: center;
      color: #33423d;
    }

    .bar-track {
      height: 8px;
      background: #edf2f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #24756f;
      border-radius: 999px;
    }

    dialog {
      width: min(880px, calc(100vw - 28px));
      border: 0;
      padding: 0;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(18, 27, 24, 0.45);
    }

    .modal {
      background: var(--surface);
      max-height: calc(100vh - 48px);
      overflow: auto;
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .modal-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .modal h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .modal-body {
      padding: 16px;
      display: grid;
      gap: 15px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(230px, 0.9fr);
      gap: 14px;
    }

    .section-title {
      font-weight: 730;
      margin-bottom: 7px;
    }

    .detail-list {
      margin: 0;
      padding-left: 19px;
      display: grid;
      gap: 6px;
      line-height: 1.38;
    }

    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #edf2f0;
      line-height: 1.35;
    }

    .kv span:first-child {
      color: var(--muted);
    }

    .backlog-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .backlog-table th,
    .backlog-table td {
      border-bottom: 1px solid #e8eeee;
      text-align: left;
      vertical-align: top;
      padding: 8px 6px;
      line-height: 1.3;
    }

    .backlog-table th {
      color: var(--muted);
      font-weight: 650;
      background: #f8faf9;
    }

    .move-buttons {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .move-buttons button {
      min-width: 42px;
      font-weight: 760;
    }

    .move-buttons button.active {
      background: #183d3a;
      color: #fff;
      border-color: #183d3a;
    }

    @media (max-width: 980px) {
      .stats {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar .actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }

      .side,
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .topbar,
      .toolbar,
      .board-wrap,
      .side {
        padding-left: 12px;
        padding-right: 12px;
      }

      h1 {
        font-size: 21px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .board {
        min-width: 0;
        width: 100%;
        grid-template-columns: 1fr;
      }

      .lane {
        min-height: 260px;
        min-width: 0;
      }

      .card,
      .metric,
      .panel {
        min-width: 0;
      }

      .bar-row,
      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

      <aside class="panel">

        <div class="sources" id="sources"></div>

            <h2 id="modalTitle"></h2>
          </div>
          <button id="closeDialog" aria-label="Закрыть">Закрыть</button>
        </div>
        <div class="move-buttons" id="modalMoves"></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </dialog>

овайдеру: бюджет токенов, разрешённые классы безопасности данных L1-L3, ограничения передачи (например, «персональные данные нельзя в облачный провайдер X»). Анонимайзер не входит в обязательный объём MVP; ограничение обеспечивается классами данных и правилами шлюза.", "Лимиты на уровне пользователя и провайдера, наследуемые от платформенных: пользователь не может превысить выделенный бюджет токенов и rate limit по разрешённым провайдерам. Лимиты на уровне агента в MVP не применяются.", "Список доступных моделей для агента формируется автоматически как пересечение разрешённых провайдеров платформы и допустимых классов безопасности источников агента (L1 - публичные/общедоступные, L2 - внутренние, L3 - конфиденциальные и персональные данные).", "Журнал обращений к LLM: пользователь/агент, провайдер, версия модели, длина запроса, токены, длительность, статус, класс данных и результат операции. Полный текст запроса и ответа хранится по политике заказчика и классу данных; рассуждения модели / chain-of-thought не хранятся.", "Аварийный режим: при технической недоступности провайдера платформа автоматически переключает агента на резервную модель, если это разрешено правилами агента и классом данных; факт переключения фиксируется в журнале."], "sourceExcerpt": "Инструмент: Двухуровневая модель управления моделями: ПРИИСК ведёт реестр разрешённых LLM-провайдеров на уровне платформы; агенты выбирают модель только из этого реестра. Весь трафик к моделям проходит через платформенный LLM-шлюз ПРИИСК. Реестр разрешённых LLM-провайдеров: облачные ( ChatGPT , DeepSeek , Minimax , GigaChat , YandexGPT и другие) и локальные (включая дообученные модели семейства Qwen ). Для каждого провайдера фиксируются контур (облако, on-prem ), статус, версия API, разрешённые классы данных и резервные модели. Целевой прокси-слой - LiteLLM или эквивалент; для локальных моделей допускается vLLM или аналогичный runtime . Прокси-слой трафика: все обращения агентов к LLM проходят через ПРИИСК. Прямое по edMoscow": "should", "moscow": "should", "moscowReason": "Требование важно для полноты НРБ, но может уточняться и внедряться после базового контура.", "backlogMatches": [], "relatedSources": []}, {"id": "NRB-8.3", "requirementId": "НРБ-8.3", "title": "Определён порядок внесения изменений в НРД", "project": "НРБ", "sourceType": "Блок 8. Анализ, контроль и непрерывное улучшение СУПД", "sourceFiles": ["Требования_к_НРБ_v3.docx"], "summary": "8. 3. Определён порядок внесения изменений в НРД: инициация изменений; согласование; утверждение; внедрение — с указанием ролей и сроков на каждом этапе.", "details": ["инициация изменений", "согласование", "утверждение", "внедрение", "с указанием ролей и сроков на каждом этапе."], "sourceExcerpt": "8. 3. Определён порядок внесения изменений в НРД: инициация изменений; согласование; утверждение; внедрение — с указанием ролей и сроков на каждом этапе.", "tags": ["Блок 8", "НРБ"], "suggestedMoscow": "should", "moscow": "should", "moscowReason": "Требование важно для полноты НРБ, но может уточняться и внедряться после базового контура.", "backlogMatches": [], "relatedSources": []}], "stats": {"cards": 86, "backlogTasks": 26, "cardsWithBacklog": 43, "cardsWithoutBacklog": 43, "byProject": {"MVP ПРИИСК": 10, "Беклог": 8, "Коробочный продукт ПРИИСК": 18, "НП для аналитиков": 9, "НРБ": 41}, "byMoscow": {"must": 33, "should": 44, "could": 8, "wont": 1}}}</script>
  <script>
    const data = JSON.parse(document.getElementById('dashboard-data').textContent);
    const cardById = new Map(data.cards.map(card => [card.id, card]));
    const storageKey = 'moscow-dashboard-state-v1:' + data.generatedAt;
    const columns = data.columns.map(col => col.id);
    let activeCardId = null;
    let suppressClick = false;

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function initialState() {
      const order = Object.fromEntries(columns.map(col => [col, []]));
      const positions = {};
      for (const card of data.cards) {
        const col = columns.includes(card.moscow) ? card.moscow : card.suggestedMoscow;
        positions[card.id] = col;
        order[col].push(card.id);
      }
      return { positions, order };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return initialState();
        const parsed = JSON.parse(raw);
        const fallback = initialState();
        for (const card of data.cards) {
          if (!parsed.positions || !columns.includes(parsed.positions[card.id])) {
            parsed.positions = parsed.positions || {};
            parsed.positions[card.id] = fallback.positions[card.id];
          }
        }
        parsed.order = parsed.order || fallback.order;
        for (const col of columns) {
          parsed.order[col] = (parsed.order[col] || []).filter(id => cardById.has(id));
        }
        for (const card of data.cards) {
          const col = parsed.positions[card.id];
          if (!parsed.order[col].includes(card.id)) parsed.order[col].push(card.id);
        }
        return parsed;
      } catch (error) {
        return initialState();
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function cloneCardWithMoscow(card) {
      const cloned = {};
      for (const key in card) {
        if (Object.prototype.hasOwnProperty.call(card, key)) cloned[key] = card[key];
      }
      cloned.moscow = state.positions[card.id] || card.moscow;
      return cloned;
    }

    function currentCards() {
      return data.cards.map(cloneCardWithMoscow);
    }

    function filterCard(card) {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const project = document.getElementById('projectFilter').value;
      const backlog = document.getElementById('backlogFilter').value;
      if (project !== 'all' && card.project !== project) return false;
      if (backlog === 'with' && card.backlogMatches.length === 0) return false;
      if (backlog === 'without' && card.backlogMatches.length > 0) return false;
      if (backlog === 'backlogOnly' && card.project !== 'Беклог') return false;
      if (!query) return true;
      const haystack = [
        card.requirementId,
        card.title,
        card.project,
        card.sourceType,
        card.summary,
        card.details.join(' '),
        card.tags.join(' '),
        card.backlogMatches.map(match => match.title + ' ' + match.effect).join(' ')
      ].join(' ').toLowerCase();
      return haystack.includes(query);
    }

    function renderStats(cards) {
      const visible = cards.filter(filterCard);
      const withBacklog = visible.filter(card => card.backlogMatches.length > 0).length;
      const backlogOnly = visible.filter(card => card.project === 'Беклог').length;
      const mCount = visible.filter(card => card.moscow === 'must').length;
      const items = [
        ['Карточек', visible.length],
        ['Есть в беклоге', withBacklog],
        ['Только беклог', backlogOnly],
        ['Must сейчас', mCount],
      ];
      document.getElementById('stats').innerHTML = items.map(([label, value]) => `
        <div class="metric"><div class="value">${value}</div><div class="label">${escapeHtml(label)}</div></div>
      `).join('');
    }

    function renderProjectBars(cards) {
      const counts = new Map();
      for (const card of cards.filter(filterCard)) {
        counts.set(card.project, (counts.get(card.project) || 0) + 1);
      }
      const max = Math.max(1, ...counts.values());
      const rows = [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'ru'));
      document.getElementById('projectBars').innerHTML = rows.map(([project, count]) => `
        <div class="bar-row">
          <div>${escapeHtml(project)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, Math.round(count / max * 100))}%"></div></div>
          <div>${count}</div>
        </div>
      `).join('');
    }

    function renderSources() {
      const sourceList = data.sourceFiles.map(src => `<div><strong>${escapeHtml(src.project)}:</strong> ${escapeHtml(src.file)}</div>`).join('');
      document.getElementById('sources').innerHTML = `
        ${sourceList}
        <div><strong>MoSCoW:</strong> M/S/C/W заданы как стартовая классификация; решения встречи сохраняются в этом браузере и выгружаются через CSV/JSON.</div>
        <div><strong>Беклог:</strong> пересечения отмечены на карточках, задачи без явного дубля добавлены отдельно как источник "Беклог".</div>
      `;
      document.getElementById('generatedAt').textContent = data.generatedAt;
    }

    function cardHtml(card) {
      const backlogBadge = card.backlogMatches.length ? '<span class="badge backlog">есть в беклоге</span>' : '';
      const tags = card.tags
        .filter(tag => tag && tag !== 'есть в беклоге')
        .slice(0, 3)
        .map(tag => `<span class="badge">${escapeHtml(tag)}</span>`)
        .join('');
      return `
        <article class="card" draggable="false" data-card-id="${escapeHtml(card.id)}" tabindex="0">
          <div class="card-meta">
            <span>${escapeHtml(card.requirementId)}</span>
            <span>${escapeHtml(card.project)}</span>
          </div>
          <div class="card-title">${escapeHtml(card.title)}</div>
          <div class="summary">${escapeHtml(card.summary)}</div>
          <div class="badges">${backlogBadge}${tags}</div>
        </article>
      `;
    }

    function renderBoard() {
      const cards = currentCards();
      renderStats(cards);
      renderProjectBars(cards);
      const board = document.getElementById('board');
      board.innerHTML = data.columns.map(col => {
        const laneIds = state.order[col.id] || [];
        const laneCards = laneIds.map(id => cardById.get(id)).filter(Boolean)
          .map(cloneCardWithMoscow)
          .filter(card => card.moscow === col.id && filterCard(card));
        return `
          <section class="lane" data-lane="${escapeHtml(col.id)}">
            <div class="lane-head">
              <div class="lane-title">
                <div><span class="lane-letter">${escapeHtml(col.letter)}</span><span class="lane-name">${escapeHtml(col.title)}</span></div>
                <span class="lane-count">${laneCards.length}</span>
              </div>
              <div class="lane-subtitle">${escapeHtml(col.subtitle)}</div>
            </div>
            <div class="dropzone" data-column="${escapeHtml(col.id)}">${laneCards.map(cardHtml).join('')}<div class="empty">Нет карточек</div></div>
          </section>
        `;
      }).join('');
      bindCards();
    }

    function bindCards() {
      for (const node of document.querySelectorAll('.card')) {
        node.addEventListener('mousedown', event => startMouseDrag(event, node));
        node.addEventListener('click', event => {
          if (suppressClick) {
            event.preventDefault();
            return;
          }
          openDetail(node.dataset.cardId);
        });
        node.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openDetail(node.dataset.cardId);
          }
        });
      }
    }

    function startMouseDrag(event, node) {
      if (event.button !== 0) return;
      const id = node.dataset.cardId;
      const startX = event.clientX;
      const startY = event.clientY;
      const rect = node.getBoundingClientRect();
      let moved = false;
      let ghost = null;
      let activeZone = null;

      function setActiveZone(zone) {
        if (activeZone === zone) return;
        if (activeZone) activeZone.classList.remove('over');
        activeZone = zone;
        if (activeZone) activeZone.classList.add('over');
      }

      function cleanup() {
        if (ghost) ghost.remove();
        node.classList.remove('drag-source');
        document.body.classList.remove('dragging');
        if (activeZone) activeZone.classList.remove('over');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      function onMove(moveEvent) {
        const dx = moveEvent.clientX - startX;
        const dy = moveEvent.clientY - startY;
        if (!moved && Math.hypot(dx, dy) > 8) {
          moved = true;
          suppressClick = true;
          node.classList.add('drag-source');
          document.body.classList.add('dragging');
          ghost = node.cloneNode(true);
          ghost.classList.add('drag-ghost');
          ghost.style.width = rect.width + 'px';
          document.body.appendChild(ghost);
        }
        if (!moved) return;
        moveEvent.preventDefault();
        ghost.style.left = moveEvent.clientX + 'px';
        ghost.style.top = moveEvent.clientY + 'px';
        const target = document.elementFromPoint(moveEvent.clientX, moveEvent.clientY);
        setActiveZone(target ? target.closest('.dropzone') : null);
      }

      function onUp() {
        const targetColumn = moved && activeZone ? activeZone.dataset.column : null;
        cleanup();
        if (targetColumn) moveCard(id, targetColumn);
        window.setTimeout(() => { suppressClick = false; }, 80);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function moveCard(id, column) {
      if (!columns.includes(column)) return;
      for (const col of columns) {
        state.order[col] = (state.order[col] || []).filter(cardId => cardId !== id);
      }
      state.positions[id] = column;
      state.order[column].push(id);
      saveState();
      renderBoard();
      if (activeCardId === id && document.getElementById('detailDialog').open) {
        openDetail(id, true);
      }
    }

    function openDetail(id, keepOpen = false) {
      const card = currentCards().find(item => item.id === id);
      if (!card) return;
      activeCardId = id;
      document.getElementById('modalMeta').innerHTML = `
        <span>${escapeHtml(card.requirementId)} · ${escapeHtml(card.project)}</span>
        <span>${escapeHtml(card.sourceType)}</span>
      `;
      document.getElementById('modalTitle').textContent = card.title;
      document.getElementById('modalMoves').innerHTML = data.columns.map(col => `
        <button data-move="${escapeHtml(col.id)}" class="${card.moscow === col.id ? 'active' : ''}" title="${escapeHtml(col.title)}">${escapeHtml(col.letter)}</button>
      `).join('');
      for (const button of document.querySelectorAll('#modalMoves button')) {
        button.addEventListener('click', () => moveCard(id, button.dataset.move));
      }

      const backlogHtml = card.backlogMatches.length
        ? `<table class="backlog-table">
            <thead><tr><th>ID</th><th>Задача</th><th>Статус</th><th>Сложн.</th><th>Важн.</th></tr></thead>
            <tbody>
              ${card.backlogMatches.map(match => `
                <tr>
                  <td>${escapeHtml(match.id)}</td>
                  <td><strong>${escapeHtml(match.title)}</strong><br>${escapeHtml(match.effect || match.rationale)}</td>
                  <td>${escapeHtml(match.status)}</td>
                  <td>${escapeHtml(match.complexity)}</td>
                  <td>${escapeHtml(match.importance)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`
        : '<div class="subtle">Связь с задачами беклога не зафиксирована.</div>';

      document.getElementById('modalBody').innerHTML = `
        <div class="detail-grid">
          <section>
            <div class="section-title">Основные моменты</div>
            <p>${escapeHtml(card.summary)}</p>
            <ul class="detail-list">
              ${card.details.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
            </ul>
          </section>
          <section>
            <div class="section-title">Атрибуты</div>
            <div class="kv"><span>MoSCoW</span><strong>${escapeHtml(card.moscow.toUpperCase())}</strong></div>
            <div class="kv"><span>Причина</span><div>${escapeHtml(card.moscowReason)}</div></div>
            <div class="kv"><span>Источник</span><div>${escapeHtml(card.sourceFiles.join(', '))}</div></div>
            <div class="kv"><span>Теги</span><div>${escapeHtml(card.tags.join(', '))}</div></div>
          </section>
        </div>
        <section>
          <div class="section-title">Связь с беклогом</div>
          ${backlogHtml}
        </section>
        <section>
          <div class="section-title">Фрагмент источника</div>
          <p>${escapeHtml(card.sourceExcerpt)}</p>
        </section>
      `;
      const dialog = document.getElementById('detailDialog');
      if (!keepOpen && !dialog.open) dialog.showModal();
    }

    function exportRows() {
      return currentCards().map(card => ({
        id: card.id,
        requirementId: card.requirementId,
        title: card.title,
        project: card.project,
        moscow: card.moscow,
        sourceType: card.sourceType,
        sourceFiles: card.sourceFiles.join(', '),
        inBacklog: card.backlogMatches.length ? 'да' : 'нет',
        backlogIds: card.backlogMatches.map(match => match.id).join(', '),
        backlogTitles: card.backlogMatches.map(match => match.title).join(' | '),
        summary: card.summary,
      }));
    }

    function download(name, mime, content) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      return '"' + String(value == null ? '' : value).replace(/"/g, '""') + '"';
    }

    function exportCsv() {
      const rows = exportRows();
      const headers = Object.keys(rows[0] || { id: '' });
      const csv = [headers.map(csvEscape).join(';')]
        .concat(rows.map(row => headers.map(header => csvEscape(row[header])).join(';')))
        .join('\n');
      download('moscow-prioritization.csv', 'text/csv;charset=utf-8', '\ufeff' + csv);
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        sourceGeneratedAt: data.generatedAt,
        cards: exportRows(),
      };
      download('moscow-prioritization.json', 'application/json;charset=utf-8', JSON.stringify(payload, null, 2));
    }

    function setupFilters() {
      const select = document.getElementById('projectFilter');
      const projects = [...new Set(data.cards.map(card => card.project))].sort((a, b) => a.localeCompare(b, 'ru'));
      select.innerHTML = '<option value="all">Все проекты</option>' + projects.map(project => `<option value="${escapeHtml(project)}">${escapeHtml(project)}</option>`).join('');
      for (const id of ['search', 'projectFilter', 'backlogFilter']) {
        document.getElementById(id).addEventListener('input', renderBoard);
        document.getElementById(id).addEventListener('change', renderBoard);
      }
      document.getElementById('clearFilters').addEventListener('click', () => {
        document.getElementById('search').value = '';
        document.getElementById('projectFilter').value = 'all';
        document.getElementById('backlogFilter').value = 'all';
        renderBoard();
      });
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      state = initialState();
      saveState();
      renderBoard();
    });
    document.getElementById('jsonBtn').addEventListener('click', exportJson);
    document.getElementById('csvBtn').addEventListener('click', exportCsv);
    document.getElementById('closeDialog').addEventListener('click', () => document.getElementById('detailDialog').close());
    document.getElementById('detailDialog').addEventListener('close', () => { activeCardId = null; });

    setupFilters();
    renderSources();
    renderBoard();
  </script>
